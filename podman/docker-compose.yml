version: '3.8'

services:
  mongodb:
    image: mongo:7.0.14
    container_name: quorafaq-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: quorafaq

  redis:
    image: redis:7.2.5-alpine3.20
    container_name: quorafaq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: quorafaq-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: quorafaq-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
      - elasticsearch
    volumes:
      - ../metadata.json:/metadata.json
      - ../faqs-complete.json:/faqs-complete.json
      - ../.integrity:/.integrity
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/quorafaq
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - JWT_SECRET=${JWT_SECRET:-quorafaq_jwt_secret_production}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: quorafaq-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
      - NEXT_PUBLIC_SOCKET_URL=http://backend:5000

  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: quorafaq-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend

volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:
