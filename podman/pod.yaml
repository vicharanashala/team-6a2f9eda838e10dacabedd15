apiVersion: v1
kind: Pod
metadata:
  name: quorafaq
  labels:
    app: quorafaq
spec:
  containers:
    - name: mongodb
      image: docker.io/mongo:7.0.14
      ports:
        - containerPort: 27017
          hostPort: 27017
      volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      resources:
        limits:
          memory: "1Gi"
          cpu: "1"

    - name: redis
      image: docker.io/redis:7.2.5-alpine3.20
      ports:
        - containerPort: 6379
          hostPort: 6379
      volumeMounts:
        - name: redis-data
          mountPath: /data

    - name: elasticsearch
      image: docker.io/elasticsearch:8.11.0
      ports:
        - containerPort: 9200
          hostPort: 9200
      env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
      volumeMounts:
        - name: es-data
          mountPath: /usr/share/elasticsearch/data
      resources:
        limits:
          memory: "1.5Gi"
          cpu: "1"

    - name: backend
      image: quorafaq-backend:latest
      ports:
        - containerPort: 5000
          hostPort: 5000
      env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "5000"
        - name: MONGODB_URI
          value: mongodb://localhost:27017/quorafaq
        - name: REDIS_URL
          value: redis://localhost:6379
        - name: ELASTICSEARCH_URL
          value: http://localhost:9200
        - name: JWT_SECRET
          value: quorafaq_jwt_secret_production
        - name: JWT_EXPIRES_IN
          value: 7d
        - name: CLIENT_URL
          value: http://localhost:8080

    - name: frontend
      image: quorafaq-frontend:latest
      ports:
        - containerPort: 3000
          hostPort: 3000
      env:
        - name: NEXT_PUBLIC_API_URL
          value: http://localhost:5000/api
        - name: NEXT_PUBLIC_SOCKET_URL
          value: http://localhost:5000

    - name: nginx
      image: quorafaq-nginx:latest
      ports:
        - containerPort: 80
          hostPort: 8080

  volumes:
    - name: mongodb-data
      hostPath:
        path: /var/lib/containers/quorafaq/mongodb
    - name: redis-data
      hostPath:
        path: /var/lib/containers/quorafaq/redis
    - name: es-data
      hostPath:
        path: /var/lib/containers/quorafaq/elasticsearch
