services:
  redis:
    image: redis:7.2.5-alpine3.20
    container_name: quorafaq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: quorafaq-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Disable memory lock to avoid issues on Windows/WSL2/Mac
      - bootstrap.memory_lock=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: quorafaq-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    env_file:
      - secrets.env
    volumes:
      - ./backend:/app
      - ./metadata.json:/metadata.json:ro
      - ./faqs-complete.json:/faqs-complete.json:ro
      - ./.integrity:/.integrity:ro
      - uploads:/app/uploads
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      # Override localhost URLs from secrets.env with Docker service names
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - FASTAPI_URL=http://fastapi:8000
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  fastapi:
    build:
      context: ./FastAPI_python_model
      dockerfile: Dockerfile
    container_name: quorafaq-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./FastAPI_python_model:/app
      - fastapi_cache:/root/.cache
    environment:
      - PORT=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: quorafaq-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - secrets.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - next_cache:/app/.next
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
      # Internal proxy uses Docker service name, not localhost
      - API_PROXY_URL=http://backend:5000/api
      # Enable polling for file watching on Windows/WSL2/Mac
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  elasticsearch_data:
  next_cache:
  uploads:
  fastapi_cache: