services:
  mongodb:
    image: mongo:7.0.14
    container_name: quorafaq-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    environment:
      - PUID=${UID:-1000}
      - PGID=${GID:-1000}

  redis:
    image: redis:7.2.5-alpine3.20
    container_name: quorafaq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    environment:
      - PUID=${UID:-1000}
      - PGID=${GID:-1000}

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: quorafaq-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - PUID=${UID:-1000}
      - PGID=${GID:-1000}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: quorafaq-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./metadata.json:/metadata.json:ro
      - ./faqs-complete.json:/faqs-complete.json:ro
      - ./.integrity:/.integrity:ro
      - uploads:/app/uploads
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/quorafaq
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - JWT_SECRET=${JWT_SECRET:-quorafaq_jwt_secret_dev}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: quorafaq-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - next_cache:/app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
      - API_PROXY_URL=http://backend:5000/api
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  next_cache:
  uploads: